<!-- Product Detail Popup — with Image Gallery + Zoom -->
<div id="prod-modal" style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.75);backdrop-filter:blur(5px);align-items:center;justify-content:center;padding:16px;" onclick="if(event.target===this)closeProdModal()">
  <div id="pm-box" style="background:#fff;border-radius:20px;max-width:860px;width:100%;max-height:94vh;overflow-y:auto;box-shadow:0 30px 90px rgba(0,0,0,.4);display:grid;grid-template-columns:1fr 1fr;position:relative;">
    <button onclick="closeProdModal()" style="position:absolute;top:13px;right:13px;width:34px;height:34px;border-radius:50%;background:#c0392b;color:#fff;border:none;cursor:pointer;font-size:1rem;z-index:10;display:flex;align-items:center;justify-content:center;flex-shrink:0;">✕</button>

    <!-- LEFT: Image Gallery + Zoom -->
    <div style="background:#f5f5f5;border-radius:20px 0 0 20px;display:flex;flex-direction:column;overflow:hidden;position:relative;">
      <span id="pm-badge" style="position:absolute;top:12px;left:12px;padding:4px 12px;border-radius:50px;font-size:.68rem;font-weight:700;display:none;z-index:3;"></span>
      <div id="pm-zoom-wrap" style="position:relative;overflow:hidden;background:#f0f0f0;display:flex;align-items:center;justify-content:center;min-height:280px;cursor:zoom-in;"
           onmousemove="zoomImage(event)" onmouseleave="resetZoom()" onclick="toggleZoom()">
        <img id="pm-img" src="" alt="" style="width:100%;height:300px;object-fit:contain;display:block;transition:transform .1s ease;transform-origin:center center;background:#f5f5f5;"/>
        <div style="position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,.4);color:#fff;font-size:.65rem;padding:3px 8px;border-radius:20px;pointer-events:none;">🔍 Hover to zoom</div>
      </div>
      <div id="pm-thumbs" style="display:flex;gap:6px;padding:10px 12px;background:#ececec;flex-wrap:wrap;"></div>
    </div>

    <!-- RIGHT: Info -->
    <div style="padding:26px 24px 24px 20px;display:flex;flex-direction:column;gap:10px;">
      <div id="pm-brand" style="font-size:.7rem;font-weight:700;color:var(--g3);text-transform:uppercase;letter-spacing:.08em;"></div>
      <h2 id="pm-name" style="font-family:var(--fh);color:var(--g1);font-size:1.25rem;line-height:1.3;margin:0;"></h2>
      <div id="pm-model" style="font-size:.78rem;color:var(--tlt);font-style:italic;"></div>
      <p id="pm-desc" style="font-size:.85rem;color:var(--tmid);line-height:1.7;margin:0;"></p>
      <div id="pm-specs"></div>
      <div style="background:var(--cream);border-radius:9px;padding:10px 13px;font-size:.78rem;color:var(--tmid);">
        <i class="fas fa-tag" style="color:var(--g3);margin-right:5px;"></i> Contact us for best price & availability
      </div>
      <div style="display:flex;flex-direction:column;gap:8px;margin-top:4px;">
        <a id="pm-wa" href="#" class="btn btn-wa" style="justify-content:center;" target="_blank" rel="noopener">
          <i class="fab fa-whatsapp"></i> Get Price on WhatsApp
        </a>
        <a href="tel:{{ phone }}" class="btn btn-green" style="justify-content:center;">
          <i class="fas fa-phone"></i> Call Now — {{ phone }}
        </a>
      </div>
    </div>
  </div>
</div>

<style>
.pm-thumb{width:56px;height:56px;object-fit:cover;border-radius:7px;cursor:pointer;border:2px solid transparent;transition:border .15s;background:#ddd;}
.pm-thumb.active{border-color:var(--g3);}
.pm-thumb:hover{border-color:var(--g3);opacity:.85;}
</style>

<script>
let _pmImages=[], _pmZoomed=false;
function openProdModal(card){
  try{
    const d=JSON.parse(card.dataset.product||'{}');
    _pmZoomed=false;
    _pmImages=d.images&&d.images.length?d.images:(d.image?[d.image]:[]);
    setMainImage(_pmImages[0]||'',d.name||'');
    const thumbs=document.getElementById('pm-thumbs');
    thumbs.innerHTML='';
    if(_pmImages.length>1){
      _pmImages.forEach((src,i)=>{
        const img=document.createElement('img');
        img.src=src;img.alt=d.name||'';
        img.className='pm-thumb'+(i===0?' active':'');
        img.onclick=()=>{
          setMainImage(src,d.name||'');
          thumbs.querySelectorAll('.pm-thumb').forEach(t=>t.classList.remove('active'));
          img.classList.add('active');
        };
        thumbs.appendChild(img);
      });
      thumbs.style.display='flex';
    } else { thumbs.style.display='none'; }
    document.getElementById('pm-brand').textContent=d.brand||'';
    document.getElementById('pm-name').textContent=d.name||'';
    document.getElementById('pm-model').textContent=d.model?'Model: '+d.model:'';
    document.getElementById('pm-desc').textContent=d.desc||d.description||'';
    const badge=document.getElementById('pm-badge');
    if(d.badge){
      const bc={Hot:'#c0392b',New:'var(--g3)',Sale:'var(--gold)',Popular:'#6c63ff'};
      const be={Hot:'🔥',New:'🆕',Sale:'🏷️',Popular:'⭐'};
      badge.textContent=(be[d.badge]||'')+' '+d.badge;
      badge.style.background=bc[d.badge]||'var(--g3)';
      badge.style.color=d.badge==='Sale'?'#000':'#fff';
      badge.style.display='inline-block';
    } else { badge.style.display='none'; }
    const specsEl=document.getElementById('pm-specs');
    if(d.specs&&d.specs.length){
      specsEl.innerHTML='<div style="display:flex;flex-direction:column;gap:5px;">'+
        d.specs.map(([k,v])=>`<div style="display:flex;gap:8px;font-size:.81rem;"><span style="background:var(--gray1);padding:4px 9px;border-radius:6px;font-weight:600;color:var(--g1);min-width:110px;flex-shrink:0;">${k}</span><span style="padding:4px 0;color:var(--tmid);">${v}</span></div>`).join('')+'</div>';
    } else { specsEl.innerHTML=''; }
    const msg=d.waMsg||((d.name||'')+' সম্পর্কে দাম ও স্টক জানতে চাই।');
    document.getElementById('pm-wa').href='https://wa.me/{{ whatsapp }}?text='+encodeURIComponent(msg);
    const modal=document.getElementById('prod-modal');
    modal.style.display='flex';
    document.body.style.overflow='hidden';
    document.getElementById('pm-box').style.gridTemplateColumns=window.innerWidth<640?'1fr':'1fr 1fr';
  } catch(e){ console.error(e); }
}
function setMainImage(src,alt){
  const img=document.getElementById('pm-img');
  img.src=src;img.alt=alt;
  img.style.display=src?'block':'none';
  img.style.transform='scale(1)';
  _pmZoomed=false;
  document.getElementById('pm-zoom-wrap').style.cursor='zoom-in';
}
function zoomImage(e){
  if(_pmZoomed)return;
  const img=document.getElementById('pm-img');
  const wrap=document.getElementById('pm-zoom-wrap');
  const rect=wrap.getBoundingClientRect();
  const x=((e.clientX-rect.left)/rect.width)*100;
  const y=((e.clientY-rect.top)/rect.height)*100;
  img.style.transformOrigin=`${x}% ${y}%`;
  img.style.transform='scale(2.2)';
}
function resetZoom(){
  if(_pmZoomed)return;
  document.getElementById('pm-img').style.transform='scale(1)';
}
function toggleZoom(){
  _pmZoomed=!_pmZoomed;
  const img=document.getElementById('pm-img');
  const wrap=document.getElementById('pm-zoom-wrap');
  img.style.transform=_pmZoomed?'scale(2.2)':'scale(1)';
  wrap.style.cursor=_pmZoomed?'zoom-out':'zoom-in';
}
function closeProdModal(){
  document.getElementById('prod-modal').style.display='none';
  document.body.style.overflow='';
  _pmZoomed=false;
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeProdModal();});
document.addEventListener('DOMContentLoaded',()=>{
  document.querySelectorAll('.prod-card[data-product]').forEach(card=>{
    card.style.cursor='pointer';
    card.addEventListener('click',e=>{
      if(!e.target.closest('.prod-actions'))openProdModal(card);
    });
  });
});
</script>
