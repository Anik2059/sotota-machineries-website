<!-- Product Detail Popup — included in pages that show product cards with data-product -->
<div id="prod-modal" style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:16px;" onclick="if(event.target===this)closeProdModal()">
  <div style="background:#fff;border-radius:20px;max-width:820px;width:100%;max-height:92vh;overflow-y:auto;box-shadow:0 30px 90px rgba(0,0,0,.35);display:grid;grid-template-columns:1fr 1fr;position:relative;">
    <button onclick="closeProdModal()" style="position:absolute;top:13px;right:13px;width:34px;height:34px;border-radius:50%;background:var(--rust);color:#fff;border:none;cursor:pointer;font-size:1rem;z-index:3;display:flex;align-items:center;justify-content:center;">✕</button>
    <!-- Image side -->
    <div id="pm-img-wrap" style="background:var(--gray1);border-radius:20px 0 0 20px;display:flex;align-items:center;justify-content:center;min-height:300px;padding:24px;position:relative;">
      <img id="pm-img" src="" alt="" style="max-width:100%;max-height:380px;object-fit:contain;border-radius:12px;"/>
      <span id="pm-badge" style="position:absolute;top:14px;left:14px;padding:4px 12px;border-radius:50px;font-size:.68rem;font-weight:700;display:none;"></span>
    </div>
    <!-- Info side -->
    <div style="padding:28px 26px 28px 22px;display:flex;flex-direction:column;gap:10px;">
      <div id="pm-brand" style="font-size:.7rem;font-weight:700;color:var(--g3);text-transform:uppercase;letter-spacing:.08em;"></div>
      <h2 id="pm-name" style="font-family:var(--fh);color:var(--g1);font-size:1.3rem;line-height:1.3;"></h2>
      <div id="pm-model" style="font-size:.78rem;color:var(--tlt);font-style:italic;"></div>
      <p id="pm-desc" style="font-size:.86rem;color:var(--tmid);line-height:1.7;"></p>
      <div id="pm-specs"></div>
      <div style="background:var(--cream);border-radius:9px;padding:10px 13px;font-size:.78rem;color:var(--tmid);">
        <i class="fas fa-tag" style="color:var(--g3);margin-right:5px;"></i> Contact us for best price & availability
      </div>
      <div style="display:flex;flex-direction:column;gap:8px;margin-top:4px;">
        <a id="pm-wa" href="#" class="btn btn-wa" style="justify-content:center;" target="_blank" rel="noopener">
          <i class="fab fa-whatsapp"></i> Get Price on WhatsApp
        </a>
        <a href="tel:{{ phone }}" class="btn btn-green" style="justify-content:center;">
          <i class="fas fa-phone"></i> Call Now — {{ phone }}
        </a>
      </div>
    </div>
  </div>
</div>

<script>
function openProdModal(card) {
  try {
    const d = JSON.parse(card.dataset.product || '{}');
    const img = document.getElementById('pm-img');
    img.src = d.image || ''; img.alt = d.name || '';
    img.style.display = d.image ? 'block' : 'none';
    document.getElementById('pm-brand').textContent = d.brand || '';
    document.getElementById('pm-name').textContent  = d.name  || '';
    document.getElementById('pm-model').textContent = d.model ? 'Model: ' + d.model : '';
    document.getElementById('pm-desc').textContent  = d.desc || d.description || '';
    const badge = document.getElementById('pm-badge');
    if (d.badge) {
      const bc = {Hot:'#c0392b',New:'var(--g3)',Sale:'var(--gold)',Popular:'#6c63ff'};
      const be = {Hot:'🔥',New:'🆕',Sale:'🏷️',Popular:'⭐'};
      badge.textContent = (be[d.badge]||'') + ' ' + d.badge;
      badge.style.background = bc[d.badge] || 'var(--g3)';
      badge.style.color = d.badge === 'Sale' ? 'var(--g0)' : '#fff';
      badge.style.display = 'inline-block';
    } else { badge.style.display = 'none'; }
    const specsEl = document.getElementById('pm-specs');
    if (d.specs && d.specs.length) {
      specsEl.innerHTML = '<div style="display:flex;flex-direction:column;gap:5px;">' +
        d.specs.map(([k,v]) =>
          `<div style="display:flex;gap:8px;font-size:.81rem;">
            <span style="background:var(--gray1);padding:4px 9px;border-radius:6px;font-weight:600;color:var(--g1);min-width:120px;flex-shrink:0;">${k}</span>
            <span style="padding:4px 0;color:var(--tmid);">${v}</span>
          </div>`
        ).join('') + '</div>';
      specsEl.style.display = 'block';
    } else { specsEl.innerHTML = ''; }
    const msg = d.waMsg || ((d.name || '') + ' সম্পর্কে দাম ও স্টক জানতে চাই।');
    document.getElementById('pm-wa').href = 'https://wa.me/{{ whatsapp }}?text=' + encodeURIComponent(msg);
    const modal = document.getElementById('prod-modal');
    modal.style.display = 'flex';
    document.body.style.overflow = 'hidden';
    // Responsive: single column on small screens
    const box = modal.querySelector('div[style*="grid-template-columns"]');
    if (box) box.style.gridTemplateColumns = window.innerWidth < 640 ? '1fr' : '1fr 1fr';
  } catch(e) { console.error(e); }
}
function closeProdModal() {
  document.getElementById('prod-modal').style.display = 'none';
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeProdModal(); });
document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.prod-card[data-product]').forEach(card => {
    card.style.cursor = 'pointer';
    card.addEventListener('click', e => {
      if (!e.target.closest('.prod-actions')) openProdModal(card);
    });
  });
});
</script>
