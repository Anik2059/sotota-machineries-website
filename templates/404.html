{% extends "base.html" %}
{% block title %}Page Not Found – Sotota Machineries{% endblock %}
{% block content %}
<div style="min-height:60vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:60px 20px;">
  <div>
    <div style="font-size:5rem;margin-bottom:16px;">🔧</div>
    <h1 style="font-family:var(--fh);font-size:3rem;color:var(--g1);margin-bottom:12px;">404</h1>
    <h2 style="font-family:var(--fh);color:var(--g3);margin-bottom:14px;">Page Not Found</h2>
    <p style="color:var(--tmid);margin-bottom:28px;max-width:400px;margin-left:auto;margin-right:auto;">The page you're looking for doesn't exist or has been moved.</p>
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
      <a href="{{ url_for('index') }}" class="btn btn-green"><i class="fas fa-home"></i> Go Home</a>
      <a href="{{ url_for('contact') }}" class="btn btn-primary"><i class="fas fa-phone"></i> Contact Us</a>
    </div>
  </div>
</div>
{% endblock %}
